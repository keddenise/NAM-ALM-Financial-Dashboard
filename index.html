<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NAM Trading — Financial Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1d4ed8;--blue2:#3b82f6;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green2:#22c55e;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --orange:#c2410c;--orange2:#f97316;--orange-bg:#fff7ed;--orange-bd:#fed7aa;
  --teal:#0e7490;--teal2:#22d3ee;--teal-bg:#ecfeff;--teal-bd:#a5f3fc;
  --red:#b91c1c;--red2:#ef4444;--red-bg:#fef2f2;--red-bd:#fecaca;
  --gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;
  --gray300:#cbd5e1;--gray500:#64748b;--gray700:#334155;--gray900:#0f172a;
  --white:#fff;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  --radius:12px;--radius-sm:8px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--gray100);color:var(--gray900);font-size:14px;min-height:100vh;}

/* ── NAV ── */
.nav{
  background:var(--white);border-bottom:1px solid var(--gray200);
  padding:0 28px;display:flex;align-items:center;
  justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);
}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
.nav-title{font-size:15px;font-weight:700;color:var(--gray900);}
.nav-sub{font-size:11px;color:var(--gray500);margin-top:1px;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:7px 15px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--gray500);font-family:var(--font);transition:all .15s;}
.nav-tab:hover{background:var(--gray100);color:var(--gray700);}
.nav-tab.active{background:var(--blue-bg);color:var(--blue);}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-select{border:1.5px solid var(--gray200);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;font-weight:600;color:var(--gray700);background:var(--gray50);cursor:pointer;outline:none;font-family:var(--font);transition:border-color .15s;}
.nav-select:hover{border-color:var(--blue2);}
.nav-clock{background:var(--blue-bg);border:1.5px solid var(--blue-bd);color:var(--blue);font-size:12px;font-weight:700;padding:6px 12px;border-radius:var(--radius-sm);min-width:90px;text-align:center;font-variant-numeric:tabular-nums;}
.nav-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s;display:flex;align-items:center;gap:5px;}
.nav-btn:hover{background:var(--blue2);}
.nav-btn:disabled{opacity:.5;cursor:default;}

/* ── WRAP ── */
.wrap{max-width:1200px;margin:0 auto;padding:24px 28px;}

/* ── STATUS ── */
.status{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:20px;font-size:12.5px;font-weight:500;border:1.5px solid var(--gray200);background:var(--white);color:var(--gray500);}
.status.loading{color:var(--orange);border-color:var(--orange-bd);background:var(--orange-bg);}
.status.error{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);}
.status.ok{color:var(--green);border-color:var(--green-bd);background:var(--green-bg);}
.spin{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PERIOD HEADER ── */
.period-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.period-title{font-size:22px;font-weight:800;color:var(--gray900);}
.period-sub{font-size:13px;color:var(--gray500);margin-top:3px;}
.period-badge{background:var(--blue-bg);border:1.5px solid var(--blue-bd);color:var(--blue);font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:8px;}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:420px){.kpi-grid{grid-template-columns:1fr;}}

/* ── KPI CARD ── */
.kpi{background:var(--white);border:2px solid var(--gray200);border-radius:var(--radius);padding:20px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s ease;user-select:none;}
.kpi:hover{border-color:var(--blue2);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.kpi.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12),var(--shadow-md);}
.kpi.active.kpi-green {border-color:var(--green); box-shadow:0 0 0 3px rgba(21,128,61,.1),var(--shadow-md);}
.kpi.active.kpi-orange{border-color:var(--orange);box-shadow:0 0 0 3px rgba(194,65,12,.1),var(--shadow-md);}
.kpi.active.kpi-teal  {border-color:var(--teal);  box-shadow:0 0 0 3px rgba(14,116,144,.1),var(--shadow-md);}
.kpi.active.kpi-red   {border-color:var(--red);   box-shadow:0 0 0 3px rgba(185,28,28,.1),var(--shadow-md);}
.kpi.active.kpi-purple{border-color:#7c3aed;       box-shadow:0 0 0 3px rgba(124,58,237,.1),var(--shadow-md);}

.kpi-dot{width:8px;height:8px;border-radius:50%;margin-bottom:14px;}
.kpi-blue   .kpi-dot{background:var(--blue);}
.kpi-green  .kpi-dot{background:var(--green2);}
.kpi-orange .kpi-dot{background:var(--orange2);}
.kpi-teal   .kpi-dot{background:var(--teal2);}
.kpi-red    .kpi-dot{background:var(--red2);}
.kpi-purple .kpi-dot{background:#7c3aed;}

.kpi-icon{position:absolute;top:18px;right:18px;font-size:20px;opacity:.5;}
.kpi-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gray500);margin-bottom:8px;}
.kpi-value{font-size:26px;font-weight:800;color:var(--gray900);line-height:1;letter-spacing:-1px;margin-bottom:6px;}
.kpi-meta{font-size:11.5px;color:var(--gray500);}
.kpi-change{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;margin-top:10px;}
.ch-up  {background:var(--green-bg);color:var(--green);}
.ch-down{background:var(--red-bg);  color:var(--red);}
.ch-flat{background:var(--blue-bg); color:var(--blue);}
.ch-ora {background:var(--orange-bg);color:var(--orange);}
.kpi-arrow{position:absolute;bottom:16px;right:16px;width:24px;height:24px;border-radius:50%;background:var(--gray100);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gray500);transition:all .2s;}
.kpi:hover .kpi-arrow,.kpi.active .kpi-arrow{background:var(--blue);color:#fff;}
.kpi.active.kpi-green  .kpi-arrow{background:var(--green);}
.kpi.active.kpi-orange .kpi-arrow{background:var(--orange);}
.kpi.active.kpi-teal   .kpi-arrow{background:var(--teal);}
.kpi.active.kpi-red    .kpi-arrow{background:var(--red);}
.kpi.active.kpi-purple .kpi-arrow{background:#7c3aed;}
.kpi-bar{margin-top:10px;}
.kpi-bar-track{height:3px;background:var(--gray200);border-radius:99px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:99px;transition:width .8s ease;}
.kpi-blue   .kpi-bar-fill{background:var(--blue);}
.kpi-green  .kpi-bar-fill{background:var(--green2);}
.kpi-orange .kpi-bar-fill{background:var(--orange2);}
.kpi-teal   .kpi-bar-fill{background:var(--teal2);}
.kpi-red    .kpi-bar-fill{background:var(--red2);}
.kpi-purple .kpi-bar-fill{background:#7c3aed;}

/* ── DRILL PANEL ── */
.drill-panel{background:var(--white);border:2px solid var(--blue);border-radius:var(--radius);overflow:hidden;margin-top:12px;margin-bottom:20px;box-shadow:var(--shadow-lg);animation:slideDown .25s ease;}
.drill-panel.dp-green {border-color:var(--green);}
.drill-panel.dp-orange{border-color:var(--orange);}
.drill-panel.dp-teal  {border-color:var(--teal);}
.drill-panel.dp-red   {border-color:var(--red);}
.drill-panel.dp-purple{border-color:#7c3aed;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.drill-header{padding:16px 22px;background:var(--blue-bg);border-bottom:1px solid var(--blue-bd);display:flex;align-items:center;justify-content:space-between;}
.dp-green  .drill-header{background:var(--green-bg); border-bottom-color:var(--green-bd);}
.dp-orange .drill-header{background:var(--orange-bg);border-bottom-color:var(--orange-bd);}
.dp-teal   .drill-header{background:var(--teal-bg);  border-bottom-color:var(--teal-bd);}
.dp-red    .drill-header{background:var(--red-bg);   border-bottom-color:var(--red-bd);}
.dp-purple .drill-header{background:#f5f3ff;          border-bottom-color:#ddd6fe;}
.drill-header-left h3{font-size:14px;font-weight:700;color:var(--gray900);}
.drill-header-left p{font-size:11.5px;color:var(--gray500);margin-top:2px;}
.drill-close{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;background:rgba(0,0,0,.08);color:var(--gray700);display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s;font-family:var(--font);}
.drill-close:hover{background:rgba(0,0,0,.15);}
.drill-body{padding:22px;}
.drill-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.dstat{background:var(--gray50);border:1px solid var(--gray200);border-radius:var(--radius-sm);padding:14px 16px;}
.dstat-val{font-size:20px;font-weight:800;color:var(--gray900);letter-spacing:-.5px;}
.dstat-lbl{font-size:10px;color:var(--gray500);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.drill-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.dtab{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray200);background:var(--white);color:var(--gray500);transition:all .15s;font-family:var(--font);}
.dtab:hover{border-color:var(--gray300);color:var(--gray700);}
.dtab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.dp-green  .dtab.active{background:var(--green); border-color:var(--green);}
.dp-orange .dtab.active{background:var(--orange);border-color:var(--orange);}
.dp-teal   .dtab.active{background:var(--teal);  border-color:var(--teal);}
.dp-red    .dtab.active{background:var(--red);   border-color:var(--red);}
.drill-chart{position:relative;height:320px;}
.drill-viz-row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;align-items:start;}
@media(max-width:700px){.drill-viz-row{grid-template-columns:1fr;}}
.drill-viz-bars{display:flex;flex-direction:column;gap:10px;padding-top:4px;}
.drill-tbl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gray400);margin-bottom:10px;}
.drill-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.drill-chart-grid .drill-chart{height:260px;}

/* ── BOTTOM ROW ── */
.bottom-row{display:grid;grid-template-columns:1fr 320px;gap:12px;margin-top:12px;}
@media(max-width:900px){.bottom-row{grid-template-columns:1fr;}}
.card{background:var(--white);border:1.5px solid var(--gray200);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.card-head-l h3{font-size:13.5px;font-weight:700;color:var(--gray900);}
.card-head-l p{font-size:11px;color:var(--gray500);margin-top:2px;}
.card-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--blue-bg);color:var(--blue);}
.card-badge.g{background:var(--green-bg);color:var(--green);}
.chart-area{position:relative;height:220px;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;}
.donut-center{position:absolute;text-align:center;pointer-events:none;}
.donut-pct{font-size:26px;font-weight:900;color:var(--gray900);}
.donut-sub{font-size:10px;color:var(--gray500);margin-top:2px;}
.donut-legend{margin-top:14px;width:100%;}
.dl-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray100);}
.dl-row:last-child{border-bottom:none;}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:6px;}
.dl-name{flex:1;font-size:11.5px;color:var(--gray700);}
.dl-val{font-size:12px;font-weight:700;color:var(--gray900);}

/* ── VIEWS ── */
.view{display:none;}
.view.active{display:block;}

/* ── TABLE ── */
.data-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px;}
.data-table thead th{padding:9px 12px;background:var(--gray50);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray500);font-weight:700;text-align:left;border-bottom:1.5px solid var(--gray200);white-space:nowrap;}
.data-table thead th.num{text-align:right;}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid var(--gray200);color:var(--gray700);white-space:nowrap;}
.data-table tbody td.num{text-align:right;font-variant-numeric:tabular-nums;}
.data-table tbody tr:hover td{background:var(--blue-bg);}
.data-table tr.tot td{background:var(--gray900)!important;color:#fff;font-weight:700;border-top:2px solid var(--gray700);}
.vp{color:var(--green);font-weight:700;}
.vn{color:var(--red);font-weight:700;}
.amt-neg{color:var(--orange)!important;}

.tbl-wrap{background:var(--white);border:1.5px solid var(--gray200);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px;}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray200);}
.tbl-head h3{font-size:13px;font-weight:700;color:var(--gray900);}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--blue2) var(--gray100);}
.tbl-scroll::-webkit-scrollbar{height:10px;}
.tbl-scroll::-webkit-scrollbar-track{background:var(--gray100);border-top:1px solid var(--gray200);}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--blue2);border-radius:5px;border:2px solid var(--gray100);}
.tbl-scroll::-webkit-scrollbar-thumb:hover{background:var(--blue);}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:800px){.chart-grid{grid-template-columns:1fr;}}

.mini-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;padding:4px 0;}
.mb{display:flex;flex-direction:column;gap:4px;}
.mb-top{display:flex;justify-content:space-between;align-items:center;}
.mb-name{font-size:11.5px;font-weight:500;color:var(--gray700);display:flex;align-items:center;gap:5px;}
.mb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mb-val{font-size:11px;font-weight:700;color:var(--gray900);}
.mb-track{height:5px;background:var(--gray100);border-radius:3px;overflow:hidden;}
.mb-fill{height:100%;border-radius:3px;transition:width .7s ease;}

/* ── BONUS ── */
.bonus-hero{background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 60%,#2563eb 100%);border-radius:var(--radius);padding:28px 32px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);}
.bonus-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05);}
.bh-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:6px;}
.bh-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:18px;}
.bh-pct{font-size:52px;font-weight:900;line-height:1;color:#fff;letter-spacing:-2px;margin-bottom:10px;}
.bh-pct span{font-size:26px;font-weight:700;color:rgba(255,255,255,.6);}
.bh-bar-wrap{height:10px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;margin-bottom:16px;}
.bh-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:5px;transition:width .8s ease;}
.bh-stats{display:flex;gap:24px;flex-wrap:wrap;}
.bh-stat-val{font-size:15px;font-weight:700;color:#fff;}
.bh-stat-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;}
.bonus-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.bcard{background:var(--white);border:1.5px solid var(--gray200);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);}
.bcard-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gray500);margin-bottom:5px;}
.bcard-val{font-size:19px;font-weight:800;color:var(--gray900);line-height:1;}
.bcard-sub{font-size:10.5px;color:var(--gray500);margin-top:3px;}
.bcard.g .bcard-val{color:var(--green);}
.bcard.o .bcard-val{color:var(--orange);}
.bonus-cfg{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--blue-bg);border:1.5px solid var(--blue-bd);border-radius:var(--radius-sm);padding:10px 16px;margin-bottom:14px;font-size:12px;color:var(--blue);}
.bonus-cfg label{font-weight:600;}
.bonus-cfg input{font-size:12px;font-weight:600;padding:5px 10px;border-radius:5px;border:1.5px solid var(--blue-bd);background:#fff;color:var(--gray900);width:130px;outline:none;font-family:var(--font);}
.bonus-cfg input:focus{border-color:var(--blue2);}
.batt-wrap{display:flex;align-items:center;gap:8px;min-width:180px;}
.batt-track{flex:1;height:13px;background:var(--gray100);border-radius:3px;overflow:hidden;border:1px solid var(--gray200);}
.batt-fill{height:100%;border-radius:2px;transition:width .5s;}
.batt-fill.low{background:linear-gradient(90deg,#ef4444,#fca5a5);}
.batt-fill.med{background:linear-gradient(90deg,#f59e0b,#fcd34d);}
.batt-fill.hi {background:linear-gradient(90deg,#16a34a,#4ade80);}
.batt-lbl{font-size:10px;font-weight:700;color:var(--gray500);white-space:nowrap;}
.batt-met{display:inline-flex;align-items:center;gap:3px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.spill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.spill.profit{background:var(--green-bg);color:var(--green);}
.spill.loss  {background:var(--orange-bg);color:var(--orange);}
</style>
</head>
<body>

<!-- ════ NAV ════ -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">N</div>
    <div>
      <div class="nav-title">NAM Trading Dashboard</div>
      <div class="nav-sub">Statement of Comprehensive Income</div>
    </div>
  </div>
  <div class="nav-tabs" style="display:none">
    <button class="nav-tab active" onclick="setView('overview')" id="tab-overview">📊 Overview</button>
    <button class="nav-tab" onclick="setView('bonus')"   id="tab-bonus"  >🎯 Bonus</button>
  </div>
  <div class="nav-right">
    <select class="nav-select" id="selYear" onchange="onYearChange()"></select>
    <select class="nav-select" id="selMonth" onchange="onMonthChange()">
      <option value="all">All Months (YTD)</option>
      <option value="Jan">January</option><option value="Feb">February</option>
      <option value="Mar">March</option><option value="Apr">April</option>
      <option value="May">May</option><option value="Jun">June</option>
      <option value="Jul">July</option><option value="Aug">August</option>
      <option value="Sep">September</option><option value="Oct">October</option>
      <option value="Nov">November</option><option value="Dec">December</option>
    </select>
    <div class="nav-clock" id="clockEl">--:--:--</div>
    <button class="nav-btn" id="btnRefresh" onclick="fetchData(true)">↻ Refresh</button>
  </div>
</nav>

<div class="wrap">

  <div class="status loading" id="statusEl">
    <span class="spin"></span>&nbsp; Connecting to Google Sheets…
  </div>

  <!-- ── OVERVIEW ── -->
  <div class="view active" id="view-overview">
    <div class="period-head" id="periodHead" style="display:none">
      <div>
        <div class="period-title" id="periodTitle">NAM Wholesale Trading</div>
        <div class="period-sub">Click any card below to drill down</div>
      </div>
      <div class="period-badge" id="periodBadge">YTD</div>
    </div>
    <div class="kpi-grid" id="kpiGrid"></div>
    <div id="drillPanel" style="display:none"></div>
    <div class="bottom-row" id="bottomRow" style="display:none">
      <div class="card">
        <div class="card-head">
          <div class="card-head-l"><h3>12-Month Performance Trend</h3><p>Net Sales · Gross Profit · Net Income</p></div>
          <span class="card-badge" id="trendBadge">FY 2025</span>
        </div>
        <div class="chart-area"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-head-l"><h3>Margin Overview</h3><p>Gross margin breakdown</p></div>
          <span class="card-badge g" id="donutBadge">YTD</span>
        </div>
        <div class="donut-wrap">
          <div style="position:relative;width:150px;height:150px;">
            <canvas id="chartDonut" width="150" height="150"></canvas>
            <div class="donut-center" style="top:50%;left:50%;transform:translate(-50%,-50%)">
              <div class="donut-pct" id="donutPct">—</div>
              <div class="donut-sub">gross margin</div>
            </div>
          </div>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>
    </div>
  </div>




</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzjNe036LSOmL1jvOxMrFGZQn8e-HPwpJ997LVP18T_ie2_5LB3HPwRiui9fG9sO5s/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MN = {Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};

let S = { year:'2025', month:'all', view:'overview', data:null, sum:null, charts:{}, activeDrill:null, drillTab:{} };

const C = {
  blue:'#1d4ed8', blue2:'#3b82f6', blueA:'rgba(59,130,246,.1)',
  green:'#15803d', green2:'#22c55e', greenA:'rgba(34,197,94,.1)',
  orange:'#c2410c', orange2:'#f97316', orangeA:'rgba(249,115,22,.1)',
  teal:'#0e7490', teal2:'#22d3ee', tealA:'rgba(34,211,238,.1)',
  red:'#b91c1c', red2:'#ef4444', redA:'rgba(239,68,68,.1)',
  muted:'#64748b', text:'#0f172a', border:'#e2e8f0',
  comp:['#1d4ed8','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe']
};

const el = id => document.getElementById(id);
const peso = (n, compact) => {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (compact && a >= 1e6) return '₱' + (n / 1e6).toFixed(2) + 'M';
  if (compact && a >= 1e3) return '₱' + (n / 1e3).toFixed(1) + 'K';
  return '₱' + n.toLocaleString('en-PH', {minimumFractionDigits:2,maximumFractionDigits:2});
};
const pct  = n => (!n && n !== 0) ? '—' : (n * 100).toFixed(1) + '%';
const sum  = a => a.reduce((s, v) => s + v, 0);
const plbl = () => S.month === 'all' ? 'YTD' : (MN[S.month] || S.month);

function getVals() {
  const d = S.data, m = S.month, isAll = m === 'all', i = MONTHS.indexOf(m);
  return {
    sales: isAll ? d.ytdSales         : (d.monthlyTrend.sales[i]       || 0),
    gp:    isAll ? d.ytdGrossProfit   : (d.monthlyTrend.grossProfit[i]  || 0),
    opex:  isAll ? d.ytdOpEx          : (d.monthlyTrend.opex[i]         || 0),
    ni:    isAll ? d.ytdNetIncome     : (d.monthlyTrend.netIncome[i]    || 0),
    cogs:  isAll ? sum(d.monthlyTrend.cogs) : (d.monthlyTrend.cogs[i]  || 0)
  };
}
function getOpexBD() {
  const m = S.month, sd = S.sum, g = o => m === 'all' ? (o.YTD||0) : (o[m]||0);
  return sd ? {comp:g(sd.compensation.total), ga:g(sd.opex.gaExpenses), comm:g(sd.opex.totalCommissions)} : null;
}
function getCogsBD() {
  const m = S.month, sd = S.sum, g = o => m === 'all' ? (o.YTD||0) : (o[m]||0);
  return sd ? {mat:g(sd.cogs.materials),supp:g(sd.cogs.officeSuppliesDirect),merch:g(sd.cogs.merchandiseSold),furn:g(sd.cogs.officeFurniture),comm:g(sd.cogs.commissionsDir),other:g(sd.cogs.otherDirect)} : null;
}
function getCompD() {
  const m = S.month, sd = S.sum, g = o => m === 'all' ? (o.YTD||0) : (o[m]||0);
  return sd ? {sal:g(sd.compensation.salariesWages),all:g(sd.compensation.allowances),ot:g(sd.compensation.overtime),b13:g(sd.compensation.bonus13th),stat:g(sd.compensation.statutoryBen),sil:g(sd.compensation.sil)} : null;
}

function setView(v) {
  S.view = v;
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  const vEl = el('view-' + v); if (vEl) vEl.classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.id === 'tab-' + v));
  if (S.data) renderAll();
}
function onYearChange() { S.year = el('selYear').value; fetchData(true); }
function onMonthChange() { S.month = el('selMonth').value; if (S.data) renderAll(); }

async function fetchData() {
  el('btnRefresh').disabled = true;
  setStatus('loading', 'Connecting to Google Sheets…');
  try {
    const cb = Date.now();
    const [kr, sr] = await Promise.all([
      fetch(API + '?action=getKPIs&year='    + S.year + '&cb=' + cb),
      fetch(API + '?action=getSummary&year=' + S.year + '&cb=' + (cb + 1))
    ]);
    const [kj, sj] = await Promise.all([kr.json(), sr.json()]);
    if (!kj.success) throw new Error(kj.error || 'KPI failed');
    if (!sj.success) throw new Error(sj.error || 'Summary failed');
    S.data = kj.data; S.sum = sj.data;
    el('periodHead').style.display = 'flex';
    el('bottomRow').style.display = 'grid';
    setStatus('ok', '✔ Updated · ' + new Date().toLocaleTimeString('en-PH'));
    renderAll();
  } catch (e) {
    setStatus('error', '⚠ ' + e.message);
  } finally {
    el('btnRefresh').disabled = false;
  }
}
function setStatus(t, m) {
  const s = el('statusEl'); s.className = 'status ' + t;
  s.innerHTML = (t === 'loading' ? '<span class="spin"></span>&nbsp; ' : '') + m;
}

function renderAll() {
  const lbl = plbl();
  el('periodTitle').textContent = 'NAM Wholesale Trading — FY ' + S.year;
  el('periodBadge').textContent = lbl;
  el('trendBadge').textContent = 'FY ' + S.year;
  el('donutBadge').textContent = lbl;
  renderKPIs(); renderTrend(); renderDonut();
  renderBonus();
  if (S.activeDrill) openDrill(S.activeDrill);
}

/* ═══ KPI CARDS ═══ */
function renderKPIs() {
  const v = getVals();
  const gm = v.sales > 0 ? v.gp   / v.sales : 0;
  const nm = v.sales > 0 ? v.ni   / v.sales : 0;
  const opx = v.sales > 0 ? v.opex / v.sales * 100 : 0;

  const cards = [
    { id:'sales', cls:'kpi-blue',   icon:'💰', label:'Net Sales',
      value: peso(v.sales, true), meta: 'Gross Profit: ' + peso(v.gp, true),
      change: plbl() + ' Revenue', chCls:'ch-flat', bar:100 },
    { id:'gp',    cls:'kpi-green',  icon:'📈', label:'Gross Profit',
      value: peso(v.gp, true),   meta: 'Margin: ' + pct(gm),
      change: (gm >= 0 ? '▲ ' : '▼ ') + pct(gm) + ' GM', chCls: gm >= 0 ? 'ch-up' : 'ch-down',
      bar: Math.min(Math.max(gm * 200, 0), 100) },
    { id:'opex',  cls:'kpi-orange', icon:'🏷️', label:'Total OpEx',
      value: peso(v.opex, true), meta: 'Operating Expenses',
      change: opx.toFixed(1) + '% of Net Sales', chCls:'ch-ora',
      bar: Math.min(opx, 100) },
    { id:'ni', cls: v.ni >= 0 ? 'kpi-teal' : 'kpi-red', icon: v.ni >= 0 ? '🏦' : '📉', label:'Net Income',
      value: peso(v.ni, true), meta: 'Net Margin: ' + pct(nm),
      change: v.ni >= 0 ? '▲ ' + pct(nm) + ' NM' : '▼ Net Loss', chCls: v.ni >= 0 ? 'ch-up' : 'ch-down',
      bar: Math.min(Math.abs(nm) * 300, 100) },
    (()=>{
      const mt = 50000, at = mt*12;
      const sd = S.sum, d2 = S.data;
      const tp = MONTHS.reduce((s,m,i)=> s + (sd ? (sd.opex.totalCommissions[m]||0) : (d2.monthlyTrend.opex[i]*0.05)), 0);
      const ap = at > 0 ? tp/at : 0;
      const metC = MONTHS.filter((m,i)=> (sd ? (sd.opex.totalCommissions[m]||0) : (d2.monthlyTrend.opex[i]*0.05)) >= mt).length;
      return { id:'bonus', cls:'kpi-purple', icon:'🎯', label:'Bonus Monitoring',
        value: (ap*100).toFixed(1)+'%', meta: metC + '/12 months met · Target: '+peso(at,true),
        change: tp >= at ? '✅ Annual Target Met!' : peso(at-tp,true)+' remaining', chCls: tp>=at?'ch-up':'ch-flat',
        bar: Math.min(ap*100,100) };
    })()
  ];

  el('kpiGrid').innerHTML = cards.map(c =>
    `<div class="kpi ${c.cls}" id="kpi-${c.id}" onclick="toggleDrill('${c.id}')">
      <div class="kpi-icon">${c.icon}</div>
      <div class="kpi-dot"></div>
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-meta">${c.meta}</div>
      <span class="kpi-change ${c.chCls}">${c.change}</span>
      <div class="kpi-bar"><div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${c.bar}%"></div></div></div>
      <div class="kpi-arrow">▾</div>
    </div>`
  ).join('');
}

/* ═══ DRILL ═══ */
function toggleDrill(id) {
  if (S.activeDrill === id) {
    S.activeDrill = null;
    document.querySelectorAll('.kpi').forEach(c => c.classList.remove('active'));
    el('drillPanel').style.display = 'none';
    return;
  }
  S.activeDrill = id;
  document.querySelectorAll('.kpi').forEach(c => c.classList.remove('active'));
  const kc = el('kpi-' + id); if (kc) kc.classList.add('active');
  openDrill(id);
}

function openDrill(id) {
  if (!S.data) return;

  const cfg = {
    sales: { title:'Net Sales — Full Breakdown',   sub:'Revenue, profit & income trend',   cls:'' },
    gp:    { title:'Gross Profit — COGS Detail',   sub:'Cost of goods breakdown',           cls:'dp-green' },
    opex:  { title:'Operating Expenses — Detail',  sub:'Compensation & expense structure',  cls:'dp-orange' },
    ni:    { title:'Net Income — Detail',           sub:'Bottom-line performance',           cls: getVals().ni >= 0 ? 'dp-teal' : 'dp-red' },
    bonus: { title:'🎯 Bonus Monitoring',           sub:'Monthly commission vs target',      cls:'dp-purple' }
  };
  const c = cfg[id];

  const panel = el('drillPanel');
  panel.style.display = 'block';
  panel.className = 'drill-panel ' + c.cls;

  const bodyContent = id === 'bonus'
    ? `<div class="drill-body">
        <div class="drill-stats">${buildStats(id)}</div>
        ${buildDrillTable(id)}
       </div>`
    : `<div class="drill-body">
        <div class="drill-stats">${buildStats(id)}</div>
        <div class="drill-viz">${buildViz(id)}</div>
        <div class="drill-tbl-label">Monthly Breakdown</div>
        ${buildDrillTable(id)}
       </div>`;

  panel.innerHTML = `
    <div class="drill-header">
      <div class="drill-header-left"><h3>${c.title}</h3><p>${c.sub} · ${plbl()} ${S.year}</p></div>
      <button class="drill-close" onclick="toggleDrill('${id}')">✕</button>
    </div>
    ${bodyContent}`;

  setTimeout(() => { if (id !== 'bonus') initDrillChart(id); panel.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 60);
}
function setDrillTab(id, tab) { S.drillTab[id] = tab; openDrill(id); }

function buildStats(id) {
  const v = getVals(), ob = getOpexBD() || {};
  const gm = v.sales > 0 ? v.gp / v.sales : 0;
  const nm = v.sales > 0 ? v.ni / v.sales : 0;
  const map = {
    sales: [{v:peso(v.sales,true),l:'Net Sales'},{v:peso(v.gp,true),l:'Gross Profit'},{v:pct(gm),l:'GM %'},{v:peso(v.ni,true),l:'Net Income'}],
    gp:    [{v:peso(v.gp,true),l:'Gross Profit'},{v:peso(v.cogs,true),l:'Total COGS'},{v:pct(gm),l:'GM %'},{v:peso(v.sales,true),l:'Net Sales'}],
    opex:  [{v:peso(v.opex,true),l:'Total OpEx'},{v:peso(ob.comp||0,true),l:'Compensation'},{v:peso(ob.ga||0,true),l:'G&A'},{v:peso(ob.comm||0,true),l:'Commissions'}],
    ni:    [{v:peso(v.ni,true),l:'Net Income'},{v:peso(v.sales,true),l:'Revenue'},{v:peso(v.gp,true),l:'Gross Profit'},{v:pct(nm),l:'Net Margin'}],
    bonus: (()=>{
      const sd=S.sum,d2=S.data,mt=50000,at=mt*12;
      const tp=MONTHS.reduce((s,m,i)=>s+(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05)),0);
      const metC=MONTHS.filter((m,i)=>(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05))>=mt).length;
      return [{v:peso(tp,true),l:'Total Progress'},{v:peso(at,true),l:'Annual Target'},{v:metC+'/12',l:'Months Met'},{v:((tp/at)*100).toFixed(1)+'%',l:'Achievement'}];
    })()
  };
  return (map[id] || []).map(s => `<div class="dstat"><div class="dstat-val">${s.v}</div><div class="dstat-lbl">${s.l}</div></div>`).join('');
}

function buildViz(id) {
  // Chart on left, ranked bars on right
  const chartHtml = `<div class="drill-chart"><canvas id="drillCanvas"></canvas></div>`;

  if (id === 'sales') {
    return `<div style="width:100%">${chartHtml}</div>`;
  }
  if (id === 'gp') {
    const b = getCogsBD() || {};
    const items = [
      {l:'Materials',v:b.mat,c:C.blue2},{l:'Office Supplies',v:b.supp,c:C.green2},
      {l:'Merchandise Sold',v:b.merch,c:C.orange2},{l:'Furniture',v:b.furn,c:C.teal2},
      {l:'Commissions',v:b.comm,c:C.red2},{l:'Other Direct',v:b.other,c:'#8b5cf6'}
    ].sort((a,b)=>b.v-a.v);
    const max = Math.max(...items.map(i=>i.v),1), tot = items.reduce((s,i)=>s+i.v,0)||1;
    const bars = items.map(it=>`
      <div class="mb"><div class="mb-top">
        <span class="mb-name"><span class="mb-dot" style="background:${it.c}"></span>${it.l}</span>
        <span class="mb-val">${peso(it.v,true)} <span style="color:var(--gray400);font-size:10px">${(it.v/tot*100).toFixed(0)}%</span></span>
      </div><div class="mb-track"><div class="mb-fill" style="width:${(it.v/max*100).toFixed(1)}%;background:${it.c}"></div></div></div>`).join('');
    return `<div class="drill-viz-row">${chartHtml}<div class="drill-viz-bars"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray400);margin-bottom:10px;">Ranked by Cost</div>${bars}</div></div>`;
  }
  if (id === 'opex') {
    const ob = getOpexBD() || {};
    const cd = getCompD() || {};
    const compItems = [
      {n:'Salaries & Wages',v:cd.sal,c:C.comp[0]},{n:'Allowances',v:cd.all,c:C.comp[1]},
      {n:'OT / Holidays',v:cd.ot,c:C.comp[2]},{n:'13th Month',v:cd.b13,c:C.comp[3]},
      {n:'Statutory Ben.',v:cd.stat,c:C.comp[4]},{n:'Service Inc.',v:cd.sil,c:C.comp[5]}
    ].sort((a,b)=>b.v-a.v);
    const max = Math.max(...compItems.map(i=>i.v),1);
    const bars = compItems.map(it=>`
      <div class="mb"><div class="mb-top">
        <span class="mb-name"><span class="mb-dot" style="background:${it.c}"></span>${it.n}</span>
        <span class="mb-val">${peso(it.v,true)}</span>
      </div><div class="mb-track"><div class="mb-fill" style="width:${(it.v/max*100).toFixed(1)}%;background:${it.c}"></div></div></div>`).join('');
    return `<div class="drill-viz-row">${chartHtml}<div class="drill-viz-bars"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray400);margin-bottom:10px;">Compensation Breakdown</div>${bars}</div></div>`;
  }
  // ni / bonus
  return `<div class="drill-viz-row">${chartHtml}</div>`;
}

function buildDrillTable(id) {
  const d = S.data.monthlyTrend;
  const H = cols => '<thead><tr>' + cols.map((c,i) => `<th${i ? ' class="num"' : ''}>${c}</th>`).join('') + '</tr></thead>';
  const wrap = html => `<div class="tbl-scroll">${html}</div>`;
  if (id === 'sales') {
    return buildISFullTable();
  }
  if (id === 'gp' && S.sum) {
    const sd = S.sum;
    const items = [{l:'Materials',d:sd.cogs.materials},{l:'Office Supplies',d:sd.cogs.officeSuppliesDirect},{l:'Merchandise Sold',d:sd.cogs.merchandiseSold},{l:'Office Furniture',d:sd.cogs.officeFurniture},{l:'Commissions (Dir)',d:sd.cogs.commissionsDir},{l:'Other Direct',d:sd.cogs.otherDirect}];
    return wrap('<table class="data-table">' + H(['COGS ITEM',...MONTHS,'YTD']) +
      '<tbody>' + items.map(it => `<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num amt-neg">${peso(it.d[m]||0)}</td>`).join('')}<td class="num amt-neg">${peso(it.d.YTD||0)}</td></tr>`).join('') +
      `<tr class="tot"><td>Total COGS</td>${MONTHS.map(m=>`<td class="num">${peso(sd.cogs.total[m]||0)}</td>`).join('')}<td class="num">${peso(sd.cogs.total.YTD||0)}</td></tr></tbody></table>`);
  }
  if (id === 'opex' && S.sum) {
    const sd = S.sum;
    const items = [{l:'Salaries & Wages',d:sd.compensation.salariesWages},{l:'Allowances',d:sd.compensation.allowances},{l:'OT / Holidays',d:sd.compensation.overtime},{l:'13th Month / Bonus',d:sd.compensation.bonus13th},{l:'Statutory Benefits',d:sd.compensation.statutoryBen},{l:'Service Incentive',d:sd.compensation.sil}];
    return wrap('<table class="data-table">' + H(['COMP ITEM',...MONTHS,'YTD']) +
      '<tbody>' + items.map(it => `<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num">${peso(it.d[m]||0)}</td>`).join('')}<td class="num">${peso(it.d.YTD||0)}</td></tr>`).join('') +
      `<tr class="tot"><td>Total Compensation</td>${MONTHS.map(m=>`<td class="num">${peso(sd.compensation.total[m]||0)}</td>`).join('')}<td class="num">${peso(sd.compensation.total.YTD||0)}</td></tr></tbody></table>`);
  }
  if (id === 'bonus') return buildBonusTable();
  return wrap('<table class="data-table">' + H(['MONTH','Net Sales','COGS','OpEx','Net Income']) +
    '<tbody>' + MONTHS.map((m,i) => `<tr><td>${m}</td><td class="num">${peso(d.sales[i])}</td><td class="num amt-neg">${peso(d.cogs[i])}</td><td class="num amt-neg">${peso(d.opex[i])}</td><td class="num ${d.netIncome[i]>=0?'vp':'vn'}">${peso(d.netIncome[i])}</td></tr>`).join('') +
    `<tr class="tot"><td>YTD</td><td class="num">${peso(sum(d.sales))}</td><td class="num">${peso(sum(d.cogs))}</td><td class="num">${peso(sum(d.opex))}</td><td class="num">${peso(sum(d.netIncome))}</td></tr></tbody></table>`);
}

function buildCompTable() {
  if (!S.sum) return '<p style="color:var(--gray500);font-size:12px;padding:12px;">No summary data yet.</p>';
  const sd = S.sum;
  const items = [
    {l:'Salaries & Wages',   d:sd.compensation.salariesWages},
    {l:'Allowances',         d:sd.compensation.allowances},
    {l:'Overtime / Holidays',d:sd.compensation.overtime},
    {l:'13th Month / Bonus', d:sd.compensation.bonus13th},
    {l:'Statutory Benefits', d:sd.compensation.statutoryBen},
    {l:'Service Incentive',  d:sd.compensation.sil}
  ];
  const H = cols => '<thead><tr>' + cols.map((c,i) => `<th${i?' class="num"':''}>${c}</th>`).join('') + '</tr></thead>';
  return `<div class="tbl-scroll"><table class="data-table">${H(['COMP ITEM',...MONTHS,'YTD'])}<tbody>` +
    items.map(it => `<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num">${peso(it.d[m]||0)}</td>`).join('')}<td class="num">${peso(it.d.YTD||0)}</td></tr>`).join('') +
    `<tr class="tot"><td>Total Compensation</td>${MONTHS.map(m=>`<td class="num">${peso(sd.compensation.total[m]||0)}</td>`).join('')}<td class="num">${peso(sd.compensation.total.YTD||0)}</td></tr>` +
    '</tbody></table></div>';

function buildISFullTable() {
  const d = S.data.monthlyTrend;
  const H = cols => '<thead><tr>' + cols.map((c,i) => `<th${i?' class="num"':''}>${c}</th>`).join('') + '</tr></thead>';
  const sec = lbl => `<tr style="background:var(--blue-bg)"><td colspan="${MONTHS.length+2}" style="font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);padding:7px 14px;">${lbl}</td></tr>`;
  const row = (lbl, arr, cls='', neg=false) => {
    const cells = arr.map(v => `<td class="num${neg&&v>0?' amt-neg':''}">${peso(v)}</td>`).join('');
    const ytdV = sum(arr);
    return `<tr${cls?` class="${cls}"`:''}}><td>${lbl}</td>${cells}<td class="num${neg&&ytdV>0?' amt-neg':''}">${peso(ytdV)}</td></tr>`;
  };
  return `<div class="tbl-scroll"><table class="data-table">${H(['DESCRIPTION',...MONTHS,'YTD'])}<tbody>` +
    sec('── Revenues') + row('Net Sales', d.sales) +
    sec('── Direct Costs (COGS)') + row('Total COGS', d.cogs, '', true) + row('Gross Profit', d.grossProfit, 'tot') +
    sec('── Operating Expenses') + row('Total OpEx', d.opex, '', true) +
    row('Net Income (Before Tax)', d.netIncome, 'tot') +

}

      <td style="font-weight:600">${r.m}</td>
      <td class="num">${peso(mt2)}</td>
      <td class="num" style="font-weight:600">${peso(r.prog)}</td>
      <td class="num ${r.va>=0?'vp':'vn'}">${r.va>=0?'+':''}${peso(r.va)}</td>
      <td>${batt}</td>
      <td class="num" style="font-weight:700">${(r.pa*100).toFixed(1)}%</td>
      <td class="num ${r.ni>=0?'vp':'vn'}">${peso(r.ni)}</td>
      <td>${niS}</td>
    </tr>`;
  }).join('');

  const aB = `<div class="batt-wrap"><div class="batt-track"><div class="batt-fill hi" style="width:${Math.min(ap*100,100).toFixed(1)}%"></div></div><span class="batt-lbl">${(ap*100).toFixed(1)}%</span></div>`;
  const totalRow = `<tr class="tot"><td>ANNUAL TOTAL</td><td class="num">${peso(at)}</td><td class="num">${peso(tp)}</td><td class="num ${ap>=1?'vp':'vn'}">${ap>=1?'+':''}${peso(tp-at)}</td><td>${aB}</td><td class="num">${(ap*100).toFixed(1)}%</td><td class="num">${peso(tni)}</td><td style="font-size:11px;color:rgba(255,255,255,.7);font-family:var(--font)">${metC}/12 months met</td></tr>`;

  return heroBanner + cfg_row + `<div class="tbl-scroll"><table class="data-table">${thead}<tbody>${tbody}${totalRow}</tbody></table></div>`;
}

/* CLOCK */
setInterval(()=>{ el('clockEl').textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); },1000);

/* YEAR SELECT */
(()=>{
  const sel = el('selYear');
  for (let y=2025;y<=2030;y++){const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);}
  sel.value='2025';
})();

/* AUTO REFRESH */
let cd=30,timer=null;
function startCD(){ clearInterval(timer); cd=30; timer=setInterval(()=>{cd--;if(cd<=0){fetchData();cd=30;}},1000); }

fetchData();
startCD();
</script>
