<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NAM Trading — Financial Dashboard</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ── ROOT TOKENS ── */
:root {
  --bs-body-font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  --bs-body-bg: #f1f5f9;
  --bs-body-color: #0f172a;

  --blue:#1d4ed8; --blue2:#3b82f6; --blue-bg:#eff6ff; --blue-bd:#bfdbfe;
  --green:#15803d; --green2:#22c55e; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
  --orange:#c2410c; --orange2:#f97316; --orange-bg:#fff7ed; --orange-bd:#fed7aa;
  --teal:#0e7490; --teal2:#22d3ee; --teal-bg:#ecfeff; --teal-bd:#a5f3fc;
  --red:#b91c1c; --red2:#ef4444; --red-bg:#fef2f2; --red-bd:#fecaca;
  --gray50:#f8fafc; --gray100:#f1f5f9; --gray200:#e2e8f0;
  --gray300:#cbd5e1; --gray500:#64748b; --gray700:#334155; --gray900:#0f172a;

  --bs-primary: #1d4ed8;
  --bs-primary-rgb: 29,78,216;
  --bs-card-border-radius: 12px;
  --bs-card-border-color: var(--gray200);
}

body { font-family: var(--bs-body-font-family); background: var(--bs-body-bg); }

/* ─── NAVBAR OVERRIDES ─── */
.navbar {
  background: #fff !important;
  border-bottom: 1px solid var(--gray200);
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
  padding: 0 1rem;
  height: 60px;
}
.navbar-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo {
  width: 34px; height: 34px; background: var(--blue); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.nav-title { font-size: 15px; font-weight: 700; color: var(--gray900); line-height: 1.2; }
.nav-sub { font-size: 11px; color: var(--gray500); }

.nav-tab-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600;
  cursor: pointer; border: none; background: transparent; color: var(--gray500);
  font-family: var(--bs-body-font-family); transition: all .15s;
}
.nav-tab-btn:hover { background: var(--gray100); color: var(--gray700); }
.nav-tab-btn.active { background: var(--blue-bg); color: var(--blue); }

.nav-clock {
  background: var(--blue-bg); border: 1.5px solid var(--blue-bd); color: var(--blue);
  font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 8px;
  min-width: 90px; text-align: center; font-variant-numeric: tabular-nums;
}

/* override Bootstrap form-select */
.form-select {
  font-size: 13px; font-weight: 600; color: var(--gray700);
  border: 1.5px solid var(--gray200); background-color: var(--gray50);
  border-radius: 8px; padding: 5px 10px; cursor: pointer; outline: none;
  font-family: var(--bs-body-font-family); transition: border-color .15s;
}
.form-select:focus { border-color: var(--blue2); box-shadow: none; }

/* override Bootstrap btn-primary */
.btn-primary {
  background: var(--blue); border-color: var(--blue);
  font-size: 12.5px; font-weight: 700; border-radius: 8px; padding: 6px 14px;
  font-family: var(--bs-body-font-family);
}
.btn-primary:hover, .btn-primary:focus { background: var(--blue2); border-color: var(--blue2); box-shadow: none; }
.btn-primary:disabled { opacity: .5; }

/* ── STATUS ALERT ── */
.status-alert {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-radius: 8px; font-size: 12.5px; font-weight: 500; margin-bottom: 18px;
  border: 1.5px solid var(--gray200); background: #fff; color: var(--gray500);
}
.status-alert.loading { color: var(--orange); border-color: var(--orange-bd); background: var(--orange-bg); }
.status-alert.error   { color: var(--red);    border-color: var(--red-bd);    background: var(--red-bg); }
.status-alert.ok      { color: var(--green);  border-color: var(--green-bd);  background: var(--green-bg); }
.spin { width:12px; height:12px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg) } }

/* ── PERIOD HEADER ── */
.period-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.period-title { font-size:22px; font-weight:800; color:var(--gray900); }
.period-sub { font-size:13px; color:var(--gray500); margin-top:3px; }
.period-badge {
  background: var(--blue-bg); border: 1.5px solid var(--blue-bd); color: var(--blue);
  font-size:12px; font-weight:700; padding:4px 14px; border-radius:999px;
}

/* ── KPI CARDS ── */
.kpi {
  background: #fff; border: 2px solid var(--gray200); border-radius: 12px;
  padding: 20px; cursor: pointer; position: relative; overflow: hidden;
  transition: all .2s ease; user-select: none; height: 100%;
}
.kpi:hover { border-color: var(--blue2); box-shadow: 0 4px 12px rgba(0,0,0,.09); transform: translateY(-2px); }
.kpi.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,78,216,.12), 0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-green  { border-color:var(--green);  box-shadow:0 0 0 3px rgba(21,128,61,.1),0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-orange { border-color:var(--orange); box-shadow:0 0 0 3px rgba(194,65,12,.1),0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-teal   { border-color:var(--teal);   box-shadow:0 0 0 3px rgba(14,116,144,.1),0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-red    { border-color:var(--red);    box-shadow:0 0 0 3px rgba(185,28,28,.1),0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-purple { border-color:#7c3aed;        box-shadow:0 0 0 3px rgba(124,58,237,.1),0 4px 12px rgba(0,0,0,.09); }

.kpi-dot { width:8px; height:8px; border-radius:50%; margin-bottom:14px; }
.kpi-blue   .kpi-dot { background:var(--blue); }
.kpi-green  .kpi-dot { background:var(--green2); }
.kpi-orange .kpi-dot { background:var(--orange2); }
.kpi-teal   .kpi-dot { background:var(--teal2); }
.kpi-red    .kpi-dot { background:var(--red2); }
.kpi-purple .kpi-dot { background:#7c3aed; }

.kpi-icon { position:absolute; top:18px; right:18px; font-size:20px; opacity:.5; }
.kpi-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--gray500); margin-bottom:8px; }
.kpi-value { font-size:26px; font-weight:800; color:var(--gray900); line-height:1; letter-spacing:-1px; margin-bottom:6px; }
.kpi-meta  { font-size:11.5px; color:var(--gray500); }

.kpi-change {
  display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700;
  padding:2px 7px; border-radius:999px; margin-top:10px;
}
.ch-up   { background:var(--green-bg); color:var(--green); }
.ch-down { background:var(--red-bg);   color:var(--red); }
.ch-flat { background:var(--blue-bg);  color:var(--blue); }
.ch-ora  { background:var(--orange-bg);color:var(--orange); }

.kpi-arrow {
  position:absolute; bottom:16px; right:16px; width:24px; height:24px;
  border-radius:50%; background:var(--gray100); display:flex; align-items:center;
  justify-content:center; font-size:11px; color:var(--gray500); transition:all .2s;
}
.kpi:hover .kpi-arrow, .kpi.active .kpi-arrow { background:var(--blue); color:#fff; }
.kpi.active.kpi-green  .kpi-arrow { background:var(--green); }
.kpi.active.kpi-orange .kpi-arrow { background:var(--orange); }
.kpi.active.kpi-teal   .kpi-arrow { background:var(--teal); }
.kpi.active.kpi-red    .kpi-arrow { background:var(--red); }
.kpi.active.kpi-purple .kpi-arrow { background:#7c3aed; }

.kpi-bar { margin-top:10px; }
.kpi-bar-track { height:3px; background:var(--gray200); border-radius:99px; overflow:hidden; }
.kpi-bar-fill  { height:100%; border-radius:99px; transition:width .8s ease; }
.kpi-blue   .kpi-bar-fill { background:var(--blue); }
.kpi-green  .kpi-bar-fill { background:var(--green2); }
.kpi-orange .kpi-bar-fill { background:var(--orange2); }
.kpi-teal   .kpi-bar-fill { background:var(--teal2); }
.kpi-red    .kpi-bar-fill { background:var(--red2); }
.kpi-purple .kpi-bar-fill { background:#7c3aed; }

.kpi-indigo .kpi-dot       { background:#4f46e5; }
.kpi-indigo .kpi-bar-fill  { background:linear-gradient(90deg,#4f46e5,#818cf8); }
.kpi.active.kpi-indigo     { border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.1),0 4px 12px rgba(0,0,0,.09); }
.kpi.active.kpi-indigo .kpi-arrow { background:#4f46e5; }

/* ── OPEX SUB-CARDS ── */
.opex-sub-card {
  background:#fff; border:2px solid var(--gray200); border-radius:8px;
  padding:14px 16px; cursor:pointer; transition:all .18s; user-select:none;
}
.opex-sub-card:hover { border-color:var(--blue2); box-shadow:0 4px 10px rgba(0,0,0,.08); transform:translateY(-1px); }
.opex-sub-card.active { transform:translateY(-1px); }
.opex-sub-card.sc-comp.active  { border-color:var(--blue);  box-shadow:0 0 0 3px rgba(29,78,216,.12),0 4px 10px rgba(0,0,0,.08); }
.opex-sub-card.sc-ga.active    { border-color:#4f46e5;       box-shadow:0 0 0 3px rgba(79,70,229,.12),0 4px 10px rgba(0,0,0,.08); }
.opex-sub-card.sc-comm.active  { border-color:var(--orange); box-shadow:0 0 0 3px rgba(194,65,12,.12),0 4px 10px rgba(0,0,0,.08); }
.opex-sub-card .sc-label   { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--gray500); margin-bottom:6px; }
.opex-sub-card .sc-value   { font-size:20px; font-weight:800; color:var(--gray900); letter-spacing:-.5px; margin-bottom:3px; }
.opex-sub-card .sc-pct     { font-size:11px; color:var(--gray500); }
.opex-sub-card .sc-bar-track { height:3px; background:var(--gray200); border-radius:99px; overflow:hidden; margin-top:10px; }
.opex-sub-card .sc-bar-fill  { height:100%; border-radius:99px; transition:width .6s ease; }
.sc-comp .sc-bar-fill { background:var(--blue); }
.sc-ga   .sc-bar-fill { background:#4f46e5; }
.sc-comm .sc-bar-fill { background:var(--orange2); }
.sc-comp.active .sc-label { color:var(--blue); }
.sc-ga.active   .sc-label { color:#4f46e5; }
.sc-comm.active .sc-label { color:var(--orange); }
.opex-content-area { min-height:200px; }

/* ── DRILL PANEL ── */
.drill-panel {
  background:#fff; border:2px solid var(--blue); border-radius:12px;
  overflow:hidden; margin-top:12px; margin-bottom:20px;
  box-shadow:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  animation:slideDown .25s ease;
}
.drill-panel.dp-green  { border-color:var(--green); }
.drill-panel.dp-orange { border-color:var(--orange); }
.drill-panel.dp-teal   { border-color:var(--teal); }
.drill-panel.dp-red    { border-color:var(--red); }
.drill-panel.dp-purple { border-color:#7c3aed; }
.drill-panel.dp-indigo { border-color:#4f46e5; }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

.drill-header {
  padding:16px 22px; background:var(--blue-bg); border-bottom:1px solid var(--blue-bd);
  display:flex; align-items:center; justify-content:space-between;
}
.dp-green  .drill-header { background:var(--green-bg);  border-bottom-color:var(--green-bd); }
.dp-orange .drill-header { background:var(--orange-bg); border-bottom-color:var(--orange-bd); }
.dp-teal   .drill-header { background:var(--teal-bg);   border-bottom-color:var(--teal-bd); }
.dp-red    .drill-header { background:var(--red-bg);    border-bottom-color:var(--red-bd); }
.dp-purple .drill-header { background:#f5f3ff;           border-bottom-color:#ddd6fe; }
.dp-indigo .drill-header { background:#eef2ff;           border-bottom-color:#c7d2fe; }
.drill-header-left h3 { font-size:14px; font-weight:700; color:var(--gray900); margin:0; }
.drill-header-left p  { font-size:11.5px; color:var(--gray500); margin:2px 0 0; }
.drill-close {
  width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
  background:rgba(0,0,0,.08); color:var(--gray700); display:flex;
  align-items:center; justify-content:center; font-size:14px;
  transition:background .15s; font-family:var(--bs-body-font-family);
}
.drill-close:hover { background:rgba(0,0,0,.15); }
.drill-body { padding:22px; }

.drill-stats {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:20px;
}
.dstat {
  background:var(--gray50); border:1px solid var(--gray200); border-radius:8px; padding:14px 16px;
}
.dstat-val { font-size:20px; font-weight:800; color:var(--gray900); letter-spacing:-.5px; }
.dstat-lbl { font-size:10px; color:var(--gray500); margin-top:3px; text-transform:uppercase; letter-spacing:.07em; font-weight:600; }

.drill-tabs { display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.dtab {
  padding:6px 14px; border-radius:999px; font-size:12px; font-weight:600;
  cursor:pointer; border:1.5px solid var(--gray200); background:#fff;
  color:var(--gray500); transition:all .15s; font-family:var(--bs-body-font-family);
}
.dtab:hover { border-color:var(--gray300); color:var(--gray700); }
.dtab.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.dp-green  .dtab.active { background:var(--green);  border-color:var(--green); }
.dp-orange .dtab.active { background:var(--orange); border-color:var(--orange); }
.dp-teal   .dtab.active { background:var(--teal);   border-color:var(--teal); }
.dp-red    .dtab.active { background:var(--red);    border-color:var(--red); }
.dp-indigo .dtab.active { background:#4f46e5;        border-color:#4f46e5; }

.drill-chart { position:relative; height:400px; }
.drill-viz-row { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:20px; align-items:start; }
@media(max-width:700px) { .drill-viz-row { grid-template-columns:1fr; } }
.drill-viz-bars { display:flex; flex-direction:column; gap:10px; padding-top:4px; }
.drill-tbl-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:#94a3b8; margin-bottom:10px; }

/* ── CHART CARDS (bottom row) ── */
.chart-card { background:#fff; border:1.5px solid var(--gray200); border-radius:12px; padding:20px; box-shadow:0 1px 2px rgba(0,0,0,.05); }
.chart-card-title { font-size:13.5px; font-weight:700; color:var(--gray900); margin:0; }
.chart-card-sub   { font-size:11px; color:var(--gray500); margin-top:2px; }
.chart-area   { position:relative; height:220px; }
.donut-wrap   { display:flex; flex-direction:column; align-items:center; justify-content:center; height:220px; }
.donut-center { position:absolute; text-align:center; pointer-events:none; }
.donut-pct    { font-size:26px; font-weight:900; color:var(--gray900); }
.donut-sub    { font-size:10px; color:var(--gray500); margin-top:2px; }
.donut-legend { margin-top:14px; width:100%; }
.dl-row       { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:1px solid #f1f5f9; }
.dl-row:last-child { border-bottom:none; }
.dl-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-right:6px; }
.dl-name { flex:1; font-size:11.5px; color:var(--gray700); }
.dl-val  { font-size:12px; font-weight:700; color:var(--gray900); }

/* ── CUSTOM BADGE ── */
.custom-badge {
  font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px;
  background:var(--blue-bg); color:var(--blue); border:none;
}
.custom-badge.g { background:var(--green-bg); color:var(--green); }

/* ── TABLE OVERRIDES ── */
.data-table { width:max-content; min-width:100%; border-collapse:collapse; font-size:12px; }
.data-table thead th {
  padding:9px 12px; background:var(--gray50); font-size:10px; text-transform:uppercase;
  letter-spacing:.07em; color:var(--gray500); font-weight:700; text-align:left;
  border-bottom:1.5px solid var(--gray200); white-space:nowrap;
}
.data-table thead th.num { text-align:right; }
.data-table tbody td   { padding:10px 12px; border-bottom:1px solid var(--gray200); color:var(--gray700); white-space:nowrap; }
.data-table tbody td.num { text-align:right; font-variant-numeric:tabular-nums; }
.data-table tbody tr:hover td { background:var(--blue-bg); }
.data-table tr.tot td { background:var(--gray900)!important; color:#fff; font-weight:700; border-top:2px solid var(--gray700); }
.vp { color:var(--green); font-weight:700; }
.vn { color:var(--red);   font-weight:700; }
.amt-neg { color:var(--orange)!important; }

.tbl-wrap { background:#fff; border:1.5px solid var(--gray200); border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,.05); overflow:hidden; margin-bottom:20px; }
.tbl-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--gray200); }
.tbl-head h3 { font-size:13px; font-weight:700; color:var(--gray900); margin:0; }
.tbl-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:var(--blue2) var(--gray100); }
.tbl-scroll::-webkit-scrollbar { height:10px; }
.tbl-scroll::-webkit-scrollbar-track { background:var(--gray100); border-top:1px solid var(--gray200); }
.tbl-scroll::-webkit-scrollbar-thumb { background:var(--blue2); border-radius:5px; border:2px solid var(--gray100); }
.tbl-scroll::-webkit-scrollbar-thumb:hover { background:var(--blue); }

/* ── MINI BARS ── */
.mini-bars { display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; padding:4px 0; }
.mb { display:flex; flex-direction:column; gap:4px; }
.mb-top { display:flex; justify-content:space-between; align-items:center; }
.mb-name { font-size:11.5px; font-weight:500; color:var(--gray700); display:flex; align-items:center; gap:5px; }
.mb-dot  { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.mb-val  { font-size:11px; font-weight:700; color:var(--gray900); }
.mb-track { height:5px; background:var(--gray100); border-radius:3px; overflow:hidden; }
.mb-fill  { height:100%; border-radius:3px; transition:width .7s ease; }

/* ── BONUS BATTERY ── */
.batt-wrap  { display:flex; align-items:center; gap:8px; min-width:180px; }
.batt-track { flex:1; height:13px; background:var(--gray100); border-radius:3px; overflow:hidden; border:1px solid var(--gray200); }
.batt-fill  { height:100%; border-radius:2px; transition:width .5s; }
.batt-fill.low { background:linear-gradient(90deg,#ef4444,#fca5a5); }
.batt-fill.med { background:linear-gradient(90deg,#f59e0b,#fcd34d); }
.batt-fill.hi  { background:linear-gradient(90deg,#16a34a,#4ade80); }
.batt-lbl  { font-size:10px; font-weight:700; color:var(--gray500); white-space:nowrap; }
.batt-met  { display:inline-flex; align-items:center; gap:3px; background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); padding:2px 8px; border-radius:999px; font-size:10px; font-weight:700; }
.spill { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:700; }
.spill.profit { background:var(--green-bg); color:var(--green); }
.spill.loss   { background:var(--orange-bg); color:var(--orange); }

/* ── RESPONSIVE KPI ── */
@media(max-width:576px) { .kpi-value { font-size:20px; } }

/* ════════════════════════════════════════
   MOBILE RESPONSIVE — phones first
   ════════════════════════════════════════ */

/* ── Navbar: two-row layout on phones ── */
@media (max-width: 767px) {
  .navbar {
    height: auto !important;
    padding: 8px 12px !important;
    flex-wrap: wrap;
  }
  .navbar .container-fluid {
    flex-wrap: wrap;
    gap: 8px;
  }
  .navbar-brand {
    flex: 1 1 auto;
  }
  .navbar .ms-auto {
    width: 100%;
    flex-wrap: wrap;
    gap: 6px !important;
    margin-left: 0 !important;
  }
  #selMonth {
    width: 100% !important;
    flex: 1 1 140px;
  }
  #selYear {
    width: 80px !important;
    flex-shrink: 0;
  }
  .nav-clock {
    display: none;
  }

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwmel6PRxAGyVp2t0p0I0QaAtC-U_xRc3C5GbJixgPBpSlR3P1Abd1XNzx-q6MyX2w/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MN = {Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};

let S = { year:'2025', month:'all', view:'overview', data:null, sum:null, charts:{}, activeDrill:null, drillTab:{}, opexSub:'comp' };

const C = {
  blue:'#1d4ed8', blue2:'#3b82f6', blueA:'rgba(59,130,246,.1)',
  green:'#15803d', green2:'#22c55e', greenA:'rgba(34,197,94,.1)',
  orange:'#c2410c', orange2:'#f97316', orangeA:'rgba(249,115,22,.1)',
  teal:'#0e7490', teal2:'#22d3ee', tealA:'rgba(34,211,238,.1)',
  red:'#b91c1c', red2:'#ef4444', redA:'rgba(239,68,68,.1)',
  muted:'#64748b', text:'#0f172a', border:'#e2e8f0',
  comp:['#1d4ed8','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe']
};

const el   = id => document.getElementById(id);
const peso = (n, compact) => {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (compact && a >= 1e6) return '₱' + (n/1e6).toFixed(2) + 'M';
  if (compact && a >= 1e3) return '₱' + (n/1e3).toFixed(1) + 'K';
  return '₱' + n.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
};
const pct  = n => (!n && n !== 0) ? '—' : (n*100).toFixed(1) + '%';
const sum  = a => a.reduce((s,v) => s+v, 0);
const plbl = () => S.month === 'all' ? 'YTD' : (MN[S.month] || S.month);

function getVals() {
  const d = S.data, m = S.month, isAll = m==='all', i = MONTHS.indexOf(m);
  return {
    sales: isAll ? d.ytdSales         : (d.monthlyTrend.sales[i]      || 0),
    gp:    isAll ? d.ytdGrossProfit   : (d.monthlyTrend.grossProfit[i] || 0),
    opex:  isAll ? d.ytdOpEx          : (d.monthlyTrend.opex[i]        || 0),
    ni:    isAll ? d.ytdNetIncome     : (d.monthlyTrend.netIncome[i]   || 0),
    cogs:  isAll ? sum(d.monthlyTrend.cogs) : (d.monthlyTrend.cogs[i] || 0)
  };
}
function getOpexBD() {
  const m=S.month, sd=S.sum, g=o=>m==='all'?(o.YTD||0):(o[m]||0);
  return sd ? {comp:g(sd.compensation.total), ga:g(sd.opex.gaExpenses), comm:g(sd.opex.totalCommissions)} : null;
}
function getCogsBD() {
  const m=S.month, sd=S.sum, g=o=>m==='all'?(o.YTD||0):(o[m]||0);
  return sd ? {mat:g(sd.cogs.materials),supp:g(sd.cogs.officeSuppliesDirect),merch:g(sd.cogs.merchandiseSold),furn:g(sd.cogs.officeFurniture),comm:g(sd.cogs.commissionsDir),other:g(sd.cogs.otherDirect)} : null;
}
function getCompD() {
  const m=S.month, sd=S.sum, g=o=>m==='all'?(o.YTD||0):(o[m]||0);
  return sd ? {sal:g(sd.compensation.salariesWages),all:g(sd.compensation.allowances),ot:g(sd.compensation.overtime),b13:g(sd.compensation.bonus13th),stat:g(sd.compensation.statutoryBen),sil:g(sd.compensation.sil)} : null;
}
function getGADetail() {
  const m=S.month, sd=S.sum;
  if (!sd||!sd.gaDetail) return null;
  const g=o=>o?(m==='all'?(o.YTD||0):(o[m]||0)):0;
  const items={};
  Object.keys(sd.gaDetail).forEach(k=>{items[k]=g(sd.gaDetail[k]);});
  return items;
}

function setView(v) {
  S.view=v;
  document.querySelectorAll('.nav-tab-btn').forEach(t=>t.classList.toggle('active',t.id==='tab-'+v));
  if (S.data) renderAll();
}
function onYearChange()  { S.year=el('selYear').value; fetchData(true); }
function onMonthChange() { S.month=el('selMonth').value; if(S.data) renderAll(); }

async function fetchData() {
  el('btnRefresh').disabled=true;
  setStatus('loading','Connecting to Google Sheets…');
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),20000);
  try {
    const cb=Date.now();
    const res=await fetch(API+'?action=getSummary&year='+S.year+'&cb='+cb,{signal:controller.signal});
    clearTimeout(timeout);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(!json.success) throw new Error(json.error||'Fetch failed');
    const sd=json.data; S.sum=sd;
    const salesArr=MONTHS.map(m=>sd.revenues.netSales[m]||0);
    const gpArr   =MONTHS.map(m=>sd.grossProfit.amount[m]||0);
    const cogsArr =MONTHS.map(m=>sd.cogs.total[m]||0);
    const opexArr =MONTHS.map(m=>sd.opex.total[m]||0);
    const niArr   =MONTHS.map(m=>sd.netIncome.afterTax[m]||0);
    S.data={
      ytdSales:sd.revenues.netSales.YTD||0, ytdGrossProfit:sd.grossProfit.amount.YTD||0,
      ytdNetIncome:sd.netIncome.afterTax.YTD||0, ytdCOGS:sd.cogs.total.YTD||0,
      ytdOpEx:sd.opex.total.YTD||0,
      grossMarginPct:(sd.revenues.netSales.YTD||0)>0?(sd.grossProfit.amount.YTD||0)/(sd.revenues.netSales.YTD||0):0,
      netMarginPct:  (sd.revenues.netSales.YTD||0)>0?(sd.netIncome.afterTax.YTD||0)/(sd.revenues.netSales.YTD||0):0,
      monthlyTrend:{months:MONTHS,sales:salesArr,grossProfit:gpArr,cogs:cogsArr,opex:opexArr,netIncome:niArr}
    };
    el('periodHead').style.display='flex';
    el('bottomRow').style.display='flex';
    setStatus('ok','<i class="bi bi-check-circle-fill me-1"></i>Updated · '+new Date().toLocaleTimeString('en-PH'));
    renderAll();
  } catch(e) {
    clearTimeout(timeout);
    const msg=e.name==='AbortError'?'Timed out after 20s — Google Sheets is slow to respond.':'⚠ '+e.message;
    setStatus('error',msg+' <button onclick="fetchData()" class="btn btn-sm btn-outline-danger ms-2 py-0" style="font-size:11px">Retry</button>');
  } finally {
    el('btnRefresh').disabled=false;
  }
}

function setStatus(t,m) {
  const s=el('statusEl'); s.className='status-alert '+t;
  s.innerHTML=(t==='loading'?'<span class="spin"></span>&nbsp; ':'')+m;
}

function renderAll() {
  const lbl=plbl();
  el('periodTitle').textContent='NAM Wholesale Trading — FY '+S.year;
  el('periodBadge').textContent=lbl;
  el('trendBadge').textContent='FY '+S.year;
  el('donutBadge').textContent=lbl;
  renderKPIs(); renderTrend(); renderDonut();
  if(S.activeDrill) openDrill(S.activeDrill);
}

/* ═══ KPI CARDS — Bootstrap col wrappers ═══ */
function renderKPIs() {
  const v=getVals();
  const gm=v.sales>0?v.gp/v.sales:0;
  const nm=v.sales>0?v.ni/v.sales:0;
  const opx=v.sales>0?v.opex/v.sales*100:0;

  const cards=[
    {id:'sales',cls:'kpi-blue',  icon:'bi-currency-dollar',label:'Net Sales',
     value:peso(v.sales,true),meta:'Gross Profit: '+peso(v.gp,true),
     change:plbl()+' Revenue',chCls:'ch-flat',bar:100},
    {id:'gp',   cls:'kpi-green', icon:'bi-graph-up-arrow', label:'Gross Profit',
     value:peso(v.gp,true),meta:'Margin: '+pct(gm),
     change:(gm>=0?'▲ ':'▼ ')+pct(gm)+' GM',chCls:gm>=0?'ch-up':'ch-down',
     bar:Math.min(Math.max(gm*200,0),100)},
    {id:'opex',cls:'kpi-orange',icon:'bi-receipt',         label:'Total OpEx',
     value:peso(v.opex,true),meta:'Operating Expenses',
     change:opx.toFixed(1)+'% of Net Sales',chCls:'ch-ora',
     bar:Math.min(opx,100)},
    {id:'ni',cls:v.ni>=0?'kpi-teal':'kpi-red',icon:v.ni>=0?'bi-bank':'bi-graph-down-arrow',label:'Net Income',
     value:peso(v.ni,true),meta:'Net Margin: '+pct(nm),
     change:v.ni>=0?'▲ '+pct(nm)+' NM':'▼ Net Loss',chCls:v.ni>=0?'ch-up':'ch-down',
     bar:Math.min(Math.abs(nm)*300,100)},
    (()=>{
      const mt=50000,at=mt*12,sd=S.sum,d2=S.data;
      const tp=MONTHS.reduce((s,m,i)=>s+(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05)),0);
      const ap=at>0?tp/at:0;
      const metC=MONTHS.filter((m,i)=>(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05))>=mt).length;
      return {id:'bonus',cls:'kpi-purple',icon:'bi-bullseye',label:'Bonus Monitoring',
        value:(ap*100).toFixed(1)+'%',meta:metC+'/12 months met · Target: '+peso(at,true),
        change:tp>=at?'✅ Annual Target Met!':peso(at-tp,true)+' remaining',chCls:tp>=at?'ch-up':'ch-flat',
        bar:Math.min(ap*100,100)};
    })()
  ];

  el('kpiGrid').innerHTML = cards.map(c =>
    `<div class="col-6 col-sm-6 col-md-4 col-xl">
      <div class="kpi ${c.cls}" id="kpi-${c.id}" onclick="toggleDrill('${c.id}')">
        <i class="bi ${c.icon} kpi-icon"></i>
        <div class="kpi-dot"></div>
        <div class="kpi-label">${c.label}</div>
        <div class="kpi-value">${c.value}</div>
        <div class="kpi-meta">${c.meta}</div>
        <span class="kpi-change ${c.chCls}">${c.change}</span>
        <div class="kpi-bar"><div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${c.bar}%"></div></div></div>
        <div class="kpi-arrow">▾</div>
      </div>
    </div>`
  ).join('');
}

/* ═══ DRILL ═══ */
function toggleDrill(id) {
  if(S.activeDrill===id){
    S.activeDrill=null;
    document.querySelectorAll('.kpi').forEach(c=>c.classList.remove('active'));
    el('drillPanel').style.display='none'; return;
  }
  S.activeDrill=id;
  document.querySelectorAll('.kpi').forEach(c=>c.classList.remove('active'));
  const kc=el('kpi-'+id); if(kc) kc.classList.add('active');
  openDrill(id);
}

function openDrill(id) {
  if(!S.data) return;
  const cfg={
    sales:{title:'Net Sales — Full Breakdown',  sub:'Revenue, profit & income trend',  cls:''},
    gp:   {title:'Gross Profit — COGS Detail',  sub:'Cost of goods breakdown',          cls:'dp-green'},
    opex: {title:'Operating Expenses — Detail', sub:'Compensation & expense structure', cls:'dp-orange'},
    ni:   {title:'Net Income — Detail',          sub:'Bottom-line performance',          cls:getVals().ni>=0?'dp-teal':'dp-red'},
    bonus:{title:'🎯 Bonus Monitoring',          sub:'Monthly commission vs target',     cls:'dp-purple'},
    ga:   {title:'🏢 G&A Expenses — Detail',     sub:'General & Administrative breakdown',cls:'dp-indigo'}
  };
  const c=cfg[id];
  const tabDefs={
    sales:[{k:'chart',l:'<i class="bi bi-bar-chart me-1"></i>Chart'},{k:'table',l:'<i class="bi bi-table me-1"></i>Table'}],
    gp:   [{k:'chart',l:'<i class="bi bi-bar-chart me-1"></i>Chart'},{k:'table',l:'<i class="bi bi-table me-1"></i>Table'}],
    opex: [],
    ni:   [{k:'chart',l:'<i class="bi bi-bar-chart me-1"></i>Chart'},{k:'table',l:'<i class="bi bi-table me-1"></i>Table'}],
    bonus:[],
    ga:   [{k:'chart',l:'<i class="bi bi-bar-chart me-1"></i>Chart'},{k:'table',l:'<i class="bi bi-table me-1"></i>Table'}]
  };
  if(!S.drillTab[id]) S.drillTab[id]='chart';
  const tab=S.drillTab[id];
  const tabHtml=(tabDefs[id]||[]).map(t=>
    `<button class="dtab${tab===t.k?' active':''}" onclick="setDrillTab('${id}','${t.k}')">${t.l}</button>`
  ).join('');

  const panel=el('drillPanel');
  panel.style.display='block';
  panel.className='drill-panel '+c.cls;

  let innerContent='';
  if(id==='bonus'){
    innerContent=`<div class="drill-stats">${buildStats(id)}</div>${buildDrillTable(id)}`;
  } else if(id==='opex'){
    innerContent=buildOpexDrill();
  } else if(tab==='table'){
    innerContent=`<div class="drill-stats">${buildStats(id)}</div>
      <div class="drill-tabs">${tabHtml}</div>
      <div class="drill-tbl-label">Monthly Breakdown</div>
      ${buildDrillTable(id)}`;
  } else {
    innerContent=`<div class="drill-stats">${buildStats(id)}</div>
      <div class="drill-tabs">${tabHtml}</div>
      <div class="drill-viz">${buildViz(id)}</div>`;
  }

  panel.innerHTML=`
    <div class="drill-header">
      <div class="drill-header-left"><h3>${c.title}</h3><p>${c.sub} · ${plbl()} ${S.year}</p></div>
      <button class="drill-close" onclick="toggleDrill('${id}')">✕</button>
    </div>
    <div class="drill-body">${innerContent}</div>`;

  setTimeout(()=>{
    if(id==='opex') initOpexSubChart(S.opexSub);
    else if(id!=='bonus'&&tab==='chart') initDrillChart(id);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function setDrillTab(id,tab){S.drillTab[id]=tab; openDrill(id);}

function buildStats(id){
  const v=getVals(),ob=getOpexBD()||{};
  const gm=v.sales>0?v.gp/v.sales:0;
  const nm=v.sales>0?v.ni/v.sales:0;
  const map={
    sales:[{v:peso(v.sales,true),l:'Net Sales'},{v:peso(v.gp,true),l:'Gross Profit'},{v:pct(gm),l:'GM %'},{v:peso(v.ni,true),l:'Net Income'}],
    gp:   [{v:peso(v.gp,true),l:'Gross Profit'},{v:peso(v.cogs,true),l:'Total COGS'},{v:pct(gm),l:'GM %'},{v:peso(v.sales,true),l:'Net Sales'}],
    opex: [{v:peso(v.opex,true),l:'Total OpEx'},{v:peso(ob.comp||0,true),l:'Compensation'},{v:peso(ob.ga||0,true),l:'G&A'},{v:peso(ob.comm||0,true),l:'Commissions'}],
    ni:   [{v:peso(v.ni,true),l:'Net Income'},{v:peso(v.sales,true),l:'Revenue'},{v:peso(v.gp,true),l:'Gross Profit'},{v:pct(nm),l:'Net Margin'}],
    bonus:(()=>{
      const sd=S.sum,d2=S.data,mt=50000,at=mt*12;
      const tp=MONTHS.reduce((s,m,i)=>s+(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05)),0);
      const metC=MONTHS.filter((m,i)=>(sd?(sd.opex.totalCommissions[m]||0):(d2.monthlyTrend.opex[i]*0.05))>=mt).length;
      return [{v:peso(tp,true),l:'Total Progress'},{v:peso(at,true),l:'Annual Target'},{v:metC+'/12',l:'Months Met'},{v:((tp/at)*100).toFixed(1)+'%',l:'Achievement'}];
    })(),
    ga:(()=>{
      const ob2=getOpexBD()||{};
      const gaTotal=ob2.ga||0;
      return [{v:peso(gaTotal,true),l:'Total G&A'},{v:peso(ob2.comp||0,true),l:'vs Compensation'},{v:peso(ob2.comm||0,true),l:'vs Commissions'},{v:((gaTotal/((ob2.comp||0)+(ob2.ga||0)+(ob2.comm||0)||1))*100).toFixed(1)+'%',l:'% of OpEx'}];
    })()
  };
  return (map[id]||[]).map(s=>`<div class="dstat"><div class="dstat-val">${s.v}</div><div class="dstat-lbl">${s.l}</div></div>`).join('');
}

function buildOpexDrill(){
  const ob=getOpexBD()||{};
  const total=(ob.comp||0)+(ob.ga||0)+(ob.comm||0)||1;
  const subCards=[
    {id:'comp',cls:'sc-comp',icon:'bi-people-fill',   label:'Compensation', val:ob.comp||0},
    {id:'ga',  cls:'sc-ga',  icon:'bi-building',      label:'G&A Expenses', val:ob.ga||0},
    {id:'comm',cls:'sc-comm',icon:'bi-briefcase-fill',label:'Commissions',  val:ob.comm||0}
  ];
  const subCardHtml=`<div class="row g-2 mb-3">
    ${subCards.map(sc=>`<div class="col-12 col-sm-4">
      <div class="opex-sub-card ${sc.cls}${S.opexSub===sc.id?' active':''}" onclick="setOpexSub('${sc.id}')">
        <div class="sc-label"><i class="bi ${sc.icon} me-1"></i>${sc.label}</div>
        <div class="sc-value">${peso(sc.val,true)}</div>
        <div class="sc-pct">${((sc.val/total)*100).toFixed(1)}% of OpEx</div>
        <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${((sc.val/total)*100).toFixed(1)}%"></div></div>
      </div></div>`).join('')}
  </div>`;
  const statsHtml=`<div class="drill-stats" style="margin-bottom:16px;">
    <div class="dstat"><div class="dstat-val">${peso(total,true)}</div><div class="dstat-lbl">Total OpEx</div></div>
    <div class="dstat"><div class="dstat-val">${((ob.comp||0)/total*100).toFixed(1)}%</div><div class="dstat-lbl">Comp %</div></div>
    <div class="dstat"><div class="dstat-val">${((ob.ga||0)/total*100).toFixed(1)}%</div><div class="dstat-lbl">G&A %</div></div>
    <div class="dstat"><div class="dstat-val">${((ob.comm||0)/total*100).toFixed(1)}%</div><div class="dstat-lbl">Comm %</div></div>
  </div>`;
  const contentTabs=`<div class="drill-tabs" style="margin-bottom:16px;">
    <button class="dtab${S.opexSubTab!=='table'?' active':''}" onclick="setOpexSubTab('chart')"><i class="bi bi-bar-chart me-1"></i>Chart</button>
    <button class="dtab${S.opexSubTab==='table'?' active':''}" onclick="setOpexSubTab('table')"><i class="bi bi-table me-1"></i>Table</button>
  </div>`;
  return statsHtml+subCardHtml+contentTabs+`<div id="opexContent" class="opex-content-area">${buildOpexSubContent()}</div>`;
}

function setOpexSub(sub){S.opexSub=sub; if(S.activeDrill==='opex') openDrill('opex');}
function setOpexSubTab(tab){S.opexSubTab=tab; if(S.activeDrill==='opex') openDrill('opex');}

function buildOpexSubContent(){
  if(!S.opexSubTab) S.opexSubTab='chart';
  if(S.opexSubTab==='table') return buildOpexSubTable();
  return `<div class="drill-viz-row"><div class="drill-chart"><canvas id="opexSubCanvas"></canvas></div>${buildOpexSubBars()}</div>`;
}

function buildOpexSubBars(){
  const sub=S.opexSub; let items=[];
  if(sub==='comp'){
    const cd=getCompD()||{};
    items=[
      {l:'Salaries & Wages',v:cd.sal,c:C.comp[0]},{l:'Allowances',v:cd.all,c:C.comp[1]},
      {l:'OT / Holidays',v:cd.ot,c:C.comp[2]},{l:'13th Month',v:cd.b13,c:C.comp[3]},
      {l:'Statutory Ben.',v:cd.stat,c:C.comp[4]},{l:'Service Inc.',v:cd.sil,c:C.comp[5]}
    ].sort((a,b)=>b.v-a.v);
  } else if(sub==='ga'){
    const ga=getGADetail()||{};
    items=Object.entries(ga).map(([k,v])=>({l:gaLabel(k),v,c:gaColor(k)})).filter(i=>i.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  } else {
    const sd=S.sum;
    items=[
      {l:'Staff Commission',v:sd?sd.opex.staffCommission.YTD||0:0,c:C.blue2},
      {l:'Sales Commission',v:sd?sd.opex.salesCommission.YTD||0:0,c:C.orange2}
    ].sort((a,b)=>b.v-a.v);
  }
  const max=Math.max(...items.map(i=>i.v),1),tot=items.reduce((s,i)=>s+i.v,0)||1;
  const title=sub==='comp'?'Compensation Detail':sub==='ga'?'Top G&A Items':'Commission Detail';
  const bars=items.map(it=>`
    <div class="mb"><div class="mb-top">
      <span class="mb-name"><span class="mb-dot" style="background:${it.c}"></span>${it.l}</span>
      <span class="mb-val">${peso(it.v,true)} <span style="color:#94a3b8;font-size:10px">${(it.v/tot*100).toFixed(0)}%</span></span>
    </div><div class="mb-track"><div class="mb-fill" style="width:${(it.v/max*100).toFixed(1)}%;background:${it.c}"></div></div></div>`).join('');
  return `<div class="drill-viz-bars"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:10px;">${title}</div>${bars}</div>`;
}

function buildOpexSubTable(){
  const sd=S.sum,sub=S.opexSub;
  const wrap=html=>`<div class="tbl-scroll">${html}</div>`;
  const H=cols=>'<thead><tr>'+cols.map((c,i)=>`<th${i?' class="num"':''}>${c}</th>`).join('')+'</tr></thead>';
  if(sub==='comp'&&sd){
    const items=[
      {l:'Salaries & Wages',d:sd.compensation.salariesWages},{l:'Allowances',d:sd.compensation.allowances},
      {l:'OT / Holidays',d:sd.compensation.overtime},{l:'13th Month / Bonus',d:sd.compensation.bonus13th},
      {l:'Statutory Benefits',d:sd.compensation.statutoryBen},{l:'Service Incentive',d:sd.compensation.sil}
    ];
    return wrap('<table class="data-table">'+H(['COMP ITEM',...MONTHS,'YTD'])+
      '<tbody>'+items.map(it=>`<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num">${peso(it.d[m]||0)}</td>`).join('')}<td class="num">${peso(it.d.YTD||0)}</td></tr>`).join('')+
      `<tr class="tot"><td>Total Compensation</td>${MONTHS.map(m=>`<td class="num">${peso(sd.compensation.total[m]||0)}</td>`).join('')}<td class="num">${peso(sd.compensation.total.YTD||0)}</td></tr>`+
      '</tbody></table>');
  }
  if(sub==='ga') return buildGATable();
  if(sub==='comm'&&sd){
    const items=[{l:'Staff Commission',d:sd.opex.staffCommission},{l:'Sales Commission',d:sd.opex.salesCommission}];
    return wrap('<table class="data-table">'+H(['COMMISSION',...MONTHS,'YTD'])+
      '<tbody>'+items.map(it=>`<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num">${peso(it.d[m]||0)}</td>`).join('')}<td class="num">${peso(it.d.YTD||0)}</td></tr>`).join('')+
      `<tr class="tot"><td>Total Commissions</td>${MONTHS.map(m=>`<td class="num">${peso(sd.opex.totalCommissions[m]||0)}</td>`).join('')}<td class="num">${peso(sd.opex.totalCommissions.YTD||0)}</td></tr>`+
      '</tbody></table>');
  }
  return '<p class="p-3 text-muted small">No detailed data available.</p>';
}

function buildISFullTable(){
  const d=S.data.monthlyTrend;
  const H=cols=>'<thead><tr>'+cols.map((c,i)=>`<th${i?' class="num"':''}>${c}</th>`).join('')+'</tr></thead>';

  };
  return `<div class="tbl-scroll"><table class="data-table">${H(['DESCRIPTION',...MONTHS,'YTD'])}<tbody>`+

}

    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:C.text,font:{size:11},boxWidth:10,padding:14}},tooltip:{backgroundColor:'#fff',borderColor:C.border,borderWidth:1.5,titleColor:C.text,bodyColor:C.muted,padding:10,cornerRadius:8,callbacks:{label:c=>' '+c.dataset.label+': '+peso(c.raw)}}},slots:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:10}}},ySales:{position:'left',grid:{color:'#f1f5f9'},ticks:{color:C.blue2,font:{size:10},callback:v=>peso(v,true)}},yNI:{position:'right',grid:{drawOnChartArea:false},ticks:{color:C.muted,font:{size:10},callback:v=>peso(v,true)},afterDataLimits(scale){const abs=Math.max(Math.abs(scale.min),Math.abs(scale.max));scale.min=-abs*1.1;scale.max=abs*1.1;}}},scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:10}}},ySales:{position:'left',grid:{color:'#f1f5f9'},ticks:{color:C.blue2,font:{size:10},callback:v=>peso(v,true)}},yNI:{position:'right',grid:{drawOnChartArea:false},ticks:{color:C.muted,font:{size:10},callback:v=>peso(v,true)},afterDataLimits(scale){const abs=Math.max(Math.abs(scale.min),Math.abs(scale.max));scale.min=-abs*1.1;scale.max=abs*1.1;}}}}}); return;
  }
  if(id==='ga'){
    const sd=S.sum;
    const gaMonthly=sd?MONTHS.map(m=>sd.opex.gaExpenses[m]||0):S.data.monthlyTrend.opex.map(v=>v*.4);
    const opts=barOpts(); opts.interaction={mode:'index',intersect:false};
    S.charts.drill=new Chart(ctx,{type:'bar',data:{labels:MONTHS,datasets:[
      {label:'G&A Expenses',data:gaMonthly,backgroundColor:'rgba(79,70,229,.22)',borderColor:'#4f46e5',borderWidth:2,borderRadius:6,order:2},
      {label:'Total OpEx',data:S.data.monthlyTrend.opex,type:'line',borderColor:C.orange2,backgroundColor:'transparent',tension:.4,pointRadius:3,borderWidth:2,borderDash:[5,3],order:1}
    ]},options:opts}); return;
  }
}

/* ═══ G&A HELPERS ═══ */
const GA_LABELS={postage:'Postage & Telecom',utilities:'Office Utilities',rental:'Office Rental',officeSupplies:'Office Supplies',officeMaint:'Office Maintenance',vehicleMaint:'Vehicle Maintenance',carRental:'Car Rental / KIA',vehicleLicense:'Vehicle Licenses',advertising:'Advertising & Publicity',seminars:'Seminars & Meetings',representation:'Representation',marketingStaff:'Marketing Staff',meals:'Meals & Refreshments',gasolineProv:'Gasoline (Province)',diesel:'Diesel for Van',gasolineMoto:'Gasoline (Motorcab)',gasolineKia:'Gasoline (KIA)',tollFees:'Toll Fees',parking:'Parking Fees',travel:'Travel Charges',cable:'Cable / Internet',fare:'Fare',taxesLicenses:'Taxes, Licenses & Permits',solicitation:'Solicitation & Rental',professional:'Professional Fees',penalty:'Penalty & Surcharges',trainings:'Trainings & Seminar',interestLoan:'Interest on Loan',miscellaneous:'Miscellaneous',amortTaxes:'Amort. - Taxes & Licenses',leaseholdExp:'Leasehold Expenses',officeEquipment:'Office Equipment',officeMaintAmort:'Office Maint. (Amort)',carAvanza:'Car Maint. - Avanza',motorcycle:'Motorcycle Maintenance',trainingsAmort:'Trainings (Amort)',miscAmort:'Miscellaneous (Amort)'};
const GA_COLORS_LIST=['#4f46e5','#7c3aed','#0e7490','#15803d','#c2410c','#b91c1c','#0369a1','#92400e','#065f46','#1e40af','#6d28d9','#9a3412','#047857','#1d4ed8','#7c2d12','#0f766e','#6b21a8','#0c4a6e'];
function gaLabel(k){return GA_LABELS[k]||k;}
function gaColor(k){const keys=Object.keys(GA_LABELS);return GA_COLORS_LIST[keys.indexOf(k)%GA_COLORS_LIST.length]||'#64748b';}

function buildGATable(){
  const sd=S.sum;
  if(!sd||!sd.gaDetail){
    const gaMonthly=MONTHS.map(m=>sd?(sd.opex.gaExpenses[m]||0):0);
    const H2='<thead><tr><th>MONTH</th><th class="num">G&A TOTAL</th><th class="num">vs Total OpEx</th></tr></thead>';
    const rows=MONTHS.map((m,i)=>`<tr><td>${m}</td><td class="num">${peso(gaMonthly[i])}</td><td class="num">${peso(S.data.monthlyTrend.opex[i])}</td></tr>`).join('');
    return `<div class="tbl-scroll"><table class="data-table">${H2}<tbody>${rows}</tbody></table></div>
      <div class="alert alert-info mt-3 small"><i class="bi bi-info-circle-fill me-1"></i><strong>Apps Script Update Needed</strong> — To see full G&A line items, add <code>gaDetail</code> to your <code>getSummary</code> response.</div>`;
  }
  const items=Object.entries(sd.gaDetail).filter(([k])=>k!=='total').map(([k,obj])=>({l:gaLabel(k),key:k,data:obj})).sort((a,b)=>(b.data.YTD||0)-(a.data.YTD||0));
  const H2='<thead><tr><th>G&A ITEM</th>'+MONTHS.map(m=>`<th class="num">${m}</th>`).join('')+'<th class="num">YTD</th></tr></thead>';
  const rows=items.map(it=>`<tr><td>${it.l}</td>${MONTHS.map(m=>`<td class="num">${peso(it.data[m]||0)}</td>`).join('')}<td class="num" style="font-weight:600">${peso(it.data.YTD||0)}</td></tr>`).join('');
  const totRow=`<tr class="tot"><td>Total G&A</td>${MONTHS.map(m=>`<td class="num">${peso(sd.opex.gaExpenses[m]||0)}</td>`).join('')}<td class="num">${peso(sd.opex.gaExpenses.YTD||0)}</td></tr>`;
  return `<div class="tbl-scroll"><table class="data-table">${H2}<tbody>${rows}${totRow}</tbody></table></div>`;
}

function mkLineOpts(){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:C.text,font:{size:11},boxWidth:10,padding:12}},tooltip:{backgroundColor:'#fff',borderColor:C.border,borderWidth:1.5,titleColor:C.text,bodyColor:C.muted,padding:10,cornerRadius:8,callbacks:{label:c=>' '+c.dataset.label+': '+peso(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:10}}},y:{grid:{color:'#f1f5f9'},ticks:{color:C.muted,font:{size:10},callback:v=>peso(v,true)}}}};}
function mkBarOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:C.text,font:{size:11},boxWidth:10,padding:12}},tooltip:{backgroundColor:'#fff',borderColor:C.border,borderWidth:1.5,titleColor:C.text,bodyColor:C.muted,padding:10,cornerRadius:8,callbacks:{label:c=>' '+c.dataset.label+': '+peso(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:10}}},y:{grid:{color:'#f1f5f9'},ticks:{color:C.muted,font:{size:10},callback:v=>peso(v,true)}}}};}
const dc=id=>{if(S.charts[id]){S.charts[id].destroy();delete S.charts[id];}};

function renderTrend(){
  const d=S.data.monthlyTrend; dc('chartTrend');
  S.charts.chartTrend=new Chart(el('chartTrend'),{type:'line',data:{labels:MONTHS,datasets:[
    {label:'Net Sales',   data:d.sales,      borderColor:C.blue2, backgroundColor:C.blueA, fill:true,tension:.4,pointRadius:3,borderWidth:2},
    {label:'Gross Profit',data:d.grossProfit,borderColor:C.green2,backgroundColor:C.greenA,fill:true,tension:.4,pointRadius:3,borderWidth:2},
    {label:'Net Income',  data:d.netIncome,  borderColor:C.teal2, backgroundColor:'transparent',fill:false,tension:.4,pointRadius:3,borderWidth:2,borderDash:[5,3]}
  ]},options:mkLineOpts()});
}

function renderDonut(){
  const v=getVals(),gm=v.sales>0?v.gp/v.sales:0;
  el('donutPct').textContent=(gm*100).toFixed(1)+'%';
  const fc=gm>=.3?C.green2:gm>=.1?C.teal2:C.orange2;
  el('donutPct').style.color=fc;
  dc('chartDonut');
  S.charts.chartDonut=new Chart(el('chartDonut'),{type:'doughnut',data:{labels:['Gross Margin','COGS %'],datasets:[{data:[Math.max(0,gm*100),Math.max(0,(1-gm)*100)],backgroundColor:[fc,'#e2e8f0'],borderColor:['#fff','#fff'],borderWidth:3}]},options:{responsive:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});
  el('donutLegend').innerHTML=[
    {dot:fc,       n:'Gross Margin',v:pct(gm)},
    {dot:'#e2e8f0',n:'COGS Share',  v:pct(1-gm)},
    {dot:C.teal2,  n:'Net Income',  v:peso(v.ni,true)}
  ].map(r=>`<div class="dl-row"><span class="dl-dot" style="background:${r.dot}"></span><span class="dl-name">${r.n}</span><span class="dl-val">${r.v}</span></div>`).join('');
}

/* ═══ BONUS TABLE ═══ */
function buildBonusTable(){
  const sd=S.sum,d=S.data;
  if(!sd&&!d) return '<p class="p-3 text-muted small">No data yet.</p>';
  const mt=50000,at=mt*12;
  const rows=MONTHS.map((m,i)=>{
    const prog=sd?(sd.opex.totalCommissions[m]||0):(d.monthlyTrend.opex[i]*0.05);
    const ni=sd?(sd.netIncome?.afterTax?.[m]||0):(d.monthlyTrend.netIncome[i]||0);
    const pa=mt>0?prog/mt:0;
    return{m,prog,ni,va:prog-mt,pa,met:pa>=1};
  });
  const tp=rows.reduce((s,r)=>s+r.prog,0);
  const tni=rows.reduce((s,r)=>s+r.ni,0);
  const ap=at>0?tp/at:0;
  const metC=rows.filter(r=>r.met).length;

  const heroBanner=`
    <div style="background:linear-gradient(135deg,#1e1b4b,#4c1d95,#5b21b6);border-radius:10px;padding:22px 26px;color:#fff;margin-bottom:18px;overflow:hidden;">
      <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px;">Annual Commission Achievement — FY ${S.year}</div>
      <div class="d-flex align-items-end flex-wrap gap-4 mb-3">
        <div class="bonus-hero-big" style="font-size:46px;font-weight:900;line-height:1;letter-spacing:-2px;">${(ap*100).toFixed(1)}<span class="bonus-hero-pct" style="font-size:22px;color:rgba(255,255,255,.6)">%</span></div>
        <div class="d-flex flex-wrap gap-3 pb-2">
          <div><div style="font-size:14px;font-weight:700">${peso(tp,true)}</div><div style="font-size:10px;color:rgba(255,255,255,.5)">Total Progress</div></div>
          <div><div style="font-size:14px;font-weight:700">${peso(at,true)}</div><div style="font-size:10px;color:rgba(255,255,255,.5)">Annual Target</div></div>
          <div><div style="font-size:14px;font-weight:700;color:${ap>=1?'#86efac':'rgba(255,255,255,.8)'}">${ap>=1?'✅ Exceeded!':peso(at-tp,true)+' left'}</div><div style="font-size:10px;color:rgba(255,255,255,.5)">Remaining</div></div>
          <div><div style="font-size:14px;font-weight:700">${metC}/12</div><div style="font-size:10px;color:rgba(255,255,255,.5)">Months Met</div></div>
        </div>
      </div>
      <div style="height:8px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${Math.min(ap*100,100).toFixed(1)}%;background:linear-gradient(90deg,#a78bfa,#7c3aed);border-radius:4px;"></div>
      </div>
    </div>`;

  const thead=`<thead><tr><th>MONTH</th><th class="num">TARGET</th><th class="num">PROGRESS</th><th class="num">VARIANCE</th><th>BATTERY LEVEL</th><th class="num">% ACHIEVED</th><th class="num">NET INCOME</th><th>STATUS</th></tr></thead>`;
  const tbody=rows.map(r=>{
    const cap=Math.min(r.pa*100,100).toFixed(1);
    const bc=r.pa>=1?'hi':r.pa>=.5?'med':'low';
    const batt=r.met
      ?`<div class="batt-wrap"><div class="batt-track"><div class="batt-fill hi" style="width:100%"></div></div><span class="batt-met">🏆 MET</span></div>`
      :`<div class="batt-wrap"><div class="batt-track"><div class="batt-fill ${bc}" style="width:${cap}%"></div></div><span class="batt-lbl">${(r.pa*100).toFixed(1)}%</span></div>`;
    const niS=r.ni>=0?'<span class="spill profit">✅ Profit</span>':'<span class="spill loss">🔴 Loss</span>';
    return `<tr><td style="font-weight:600">${r.m}</td><td class="num">${peso(mt)}</td><td class="num" style="font-weight:600">${peso(r.prog)}</td><td class="num ${r.va>=0?'vp':'vn'}">${r.va>=0?'+':''}${peso(r.va)}</td><td>${batt}</td><td class="num" style="font-weight:700">${(r.pa*100).toFixed(1)}%</td><td class="num ${r.ni>=0?'vp':'vn'}">${peso(r.ni)}</td><td>${niS}</td></tr>`;
  }).join('');
  const aB=`<div class="batt-wrap"><div class="batt-track"><div class="batt-fill hi" style="width:${Math.min(ap*100,100).toFixed(1)}%"></div></div><span class="batt-lbl">${(ap*100).toFixed(1)}%</span></div>`;
  const totalRow=`<tr class="tot"><td>ANNUAL TOTAL</td><td class="num">${peso(at)}</td><td class="num">${peso(tp)}</td><td class="num ${ap>=1?'vp':'vn'}">${ap>=1?'+':''}${peso(tp-at)}</td><td>${aB}</td><td class="num">${(ap*100).toFixed(1)}%</td><td class="num">${peso(tni)}</td><td style="font-size:11px;color:rgba(255,255,255,.7)">${metC}/12 months met</td></tr>`;
  return heroBanner+`<div class="tbl-scroll"><table class="data-table">${thead}<tbody>${tbody}${totalRow}</tbody></table></div>`;
}

function renderBonus(){}

/* ═══ CLOCK ═══ */
setInterval(()=>{
  el('clockEl').textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

/* ═══ YEAR SELECT ═══ */
(()=>{
  const sel=el('selYear');
  for(let y=2025;y<=2030;y++){
    const o=document.createElement('option');
    o.value=y; o.textContent=y; sel.appendChild(o);
  }
  sel.value='2025';
})();

/* ═══ AUTO REFRESH ═══ */
let cd=30,timer=null;
function startCD(){clearInterval(timer);cd=30;timer=setInterval(()=>{cd--;if(cd<=0){fetchData();cd=30;}},1000);}
fetchData();
startCD();
</script>
